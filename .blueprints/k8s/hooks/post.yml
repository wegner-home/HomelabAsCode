---
# Post-generation hook for k8s blueprint
# Handles post-generation placeholder files

- name: 'Post-hook — Create gotk-components.yaml placeholder'
  ansible.builtin.copy:
    content: |
      # This file is generated by `flux bootstrap` command
      # It contains the FluxCD components (source-controller, kustomize-controller, etc.)
      # Run: flux bootstrap git --url={{ blueprint_repo_context.fluxcd_git_repo }} --branch={{ blueprint_repo_context.fluxcd_git_branch }} --path=clusters/{{ blueprint_env }}
      #
      # Alternatively, generate manually:
      # flux install --export > clusters/{{ blueprint_env }}/flux-system/gotk-components.yaml
    dest: '{{ blueprint_output_dir }}/clusters/{{ blueprint_env }}/flux-system/gotk-components.yaml'
    force: false # Don't overwrite if flux bootstrap already created it
    mode: '0644'

- name: 'Post-hook — Create apps/base/.gitkeep'
  ansible.builtin.copy:
    content: |
      # Add your application manifests here
      # Example: apps/base/whoami/kustomization.yaml
    dest: '{{ blueprint_output_dir }}/apps/base/.gitkeep'
    force: false
    mode: '0644'
