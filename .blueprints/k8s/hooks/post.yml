---
# Post-generation hook for k8s blueprint
# Handles conditional kube-vip template rendering and placeholder files

- name: 'Post-hook — Handle kube-vip HelmRelease (templated vs static)'
  block:
    - name: 'Render kube-vip HelmRelease with VIP config (VIP enabled)'
      ansible.builtin.template:
        src: '{{ blueprint_source_dir }}/templates/infrastructure/controllers/kube-vip/helmrelease.yaml.j2'
        dest: '{{ blueprint_output_dir }}/infrastructure/controllers/kube-vip/helmrelease.yaml'
        mode: '0644'
      vars:
        kube_vip_address: '{{ blueprint_repo_context.kube_vip_address }}'
        kube_vip_interface: '{{ blueprint_repo_context.kube_vip_interface }}'
      when: blueprint_repo_context.kube_vip_enabled | bool

    - name: 'Copy static kube-vip HelmRelease (VIP disabled)'
      ansible.builtin.copy:
        src: '{{ blueprint_source_dir }}/static/infrastructure/controllers/kube-vip/helmrelease.yaml'
        dest: '{{ blueprint_output_dir }}/infrastructure/controllers/kube-vip/helmrelease.yaml'
        mode: '0644'
      when: not (blueprint_repo_context.kube_vip_enabled | bool)

- name: 'Post-hook — Create gotk-components.yaml placeholder'
  ansible.builtin.copy:
    content: |
      # This file is generated by `flux bootstrap` command
      # It contains the FluxCD components (source-controller, kustomize-controller, etc.)
      # Run: flux bootstrap git --url={{ blueprint_repo_context.fluxcd_git_repo }} --branch={{ blueprint_repo_context.fluxcd_git_branch }} --path=clusters/{{ blueprint_env }}
      #
      # Alternatively, generate manually:
      # flux install --export > clusters/{{ blueprint_env }}/flux-system/gotk-components.yaml
    dest: '{{ blueprint_output_dir }}/clusters/{{ blueprint_env }}/flux-system/gotk-components.yaml'
    force: false # Don't overwrite if flux bootstrap already created it
    mode: '0644'

- name: 'Post-hook — Create apps/base/.gitkeep'
  ansible.builtin.copy:
    content: |
      # Add your application manifests here
      # Example: apps/base/whoami/kustomization.yaml
    dest: '{{ blueprint_output_dir }}/apps/base/.gitkeep'
    force: false
    mode: '0644'
