# Blueprint: k8s
# Purpose: Generate FluxCD GitOps repository for Kubernetes cluster management
# Env expansion: Uses _env_ pattern to create per-environment cluster directories

name: k8s
description: FluxCD GitOps repository for Kubernetes infrastructure and apps
version: '1.0.0'

# This blueprint does NOT iterate over hosts — it's cluster-level
# Instead, it uses _env_ expansion for per-environment cluster directories
host_source: null # No host iteration
env_expansion: true # Enable _env_ pattern substitution

# Context variables passed to all templates
context:
  cluster_name: "{{ global_talos_cluster.cluster_name | default('{{ project_name }}') }}"
  fluxcd_git_repo: "{{ global_talos_cluster.fluxcd.git_repo | default('') }}"
  fluxcd_git_branch: "{{ global_talos_cluster.fluxcd.git_branch | default('main') }}"
  traefik_enabled: '{{ global_talos_cluster.traefik.enabled | default(true) }}'
  traefik_domain: '{{ global_talos_cluster.traefik.domain | default(global_domain) }}'
  traefik_dashboard_subdomain: "{{ global_talos_cluster.traefik.dashboard_subdomain | default('traefik') }}"
  traefik_service_type: "{{ global_talos_cluster.traefik.service_type | default('LoadBalancer') }}"
  traefik_replicas: '{{ global_talos_cluster.traefik.replicas | default(1) }}'
  traefik_cloudflare_enabled: '{{ global_talos_cluster.traefik.cloudflare.enabled | default(false) }}'
  traefik_cloudflare_issuer_name: "{{ global_talos_cluster.traefik.cloudflare.issuer_name | default('letsencrypt-cloudflare') }}"
  traefik_cloudflare_acme_email: "{{ global_talos_cluster.traefik.cloudflare.acme_email | default('admin@' + global_domain) }}"
  traefik_cloudflare_api_token_secret_name: "{{ global_talos_cluster.traefik.cloudflare.api_token_secret_name | default('cloudflare-api-token') }}"
  traefik_cloudflare_api_token_secret_key: "{{ global_talos_cluster.traefik.cloudflare.api_token_secret_key | default('api-token') }}"
  monitoring_enabled: '{{ global_talos_cluster.monitoring.enabled | default(true) }}'
  monitoring_namespace: "{{ global_talos_cluster.monitoring.namespace | default('monitoring') }}"
  monitoring_storage_class: "{{ global_talos_cluster.monitoring.storage_class | default('longhorn') }}"
  monitoring_domain: '{{ global_talos_cluster.monitoring.domain | default(global_talos_cluster.traefik.domain | default(global_domain)) }}'
  monitoring_grafana_subdomain: "{{ global_talos_cluster.monitoring.grafana_subdomain | default('grafana') }}"
  monitoring_loki_subdomain: "{{ global_talos_cluster.monitoring.loki_subdomain | default('loki') }}"
  monitoring_prometheus_storage_size: "{{ global_talos_cluster.monitoring.prometheus_storage_size | default('50Gi') }}"
  monitoring_alertmanager_storage_size: "{{ global_talos_cluster.monitoring.alertmanager_storage_size | default('10Gi') }}"
  monitoring_grafana_storage_size: "{{ global_talos_cluster.monitoring.grafana_storage_size | default('10Gi') }}"
  monitoring_loki_storage_size: "{{ global_talos_cluster.monitoring.loki_storage_size | default('50Gi') }}"
  monitoring_ingress_class_name: "{{ global_talos_cluster.monitoring.ingress_class_name | default('traefik') }}"
  monitoring_tls_issuer: "{{ (global_talos_cluster.monitoring.tls_issuer | default('')) if (global_talos_cluster.monitoring.tls_issuer | default('') | length > 0) else ((global_talos_cluster.traefik.cloudflare.enabled | default(false)) | ternary(global_talos_cluster.traefik.cloudflare.issuer_name | default('letsencrypt-cloudflare'), 'selfsigned-issuer')) }}"
  monitoring_glances_dashboard_enabled: '{{ global_talos_cluster.monitoring.glances_dashboard.enabled | default(true) }}'
  monitoring_glances_dashboard_gnet_id: '{{ global_talos_cluster.monitoring.glances_dashboard.gnet_id | default(2387) }}'
  monitoring_glances_dashboard_revision: '{{ global_talos_cluster.monitoring.glances_dashboard.revision | default(1) }}'
  monitoring_glances_dashboard_datasource: "{{ global_talos_cluster.monitoring.glances_dashboard.datasource | default('InfluxDB') }}"
  proxmox_csi_enabled: '{{ global_talos_cluster.proxmox_csi.enabled | default(false) }}'
  proxmox_csi_namespace: "{{ global_talos_cluster.proxmox_csi.namespace | default('csi-proxmox') }}"
  proxmox_csi_helm_repository_url: "{{ global_talos_cluster.proxmox_csi.helm_repository_url | default('https://sergelogvinov.github.io/charts') }}"
  proxmox_csi_chart_version: "{{ global_talos_cluster.proxmox_csi.chart_version | default('0.5.x') }}"
  proxmox_csi_release_name: "{{ global_talos_cluster.proxmox_csi.release_name | default('proxmox-csi-plugin') }}"
  proxmox_csi_manage_config_secret: '{{ global_talos_cluster.proxmox_csi.manage_config_secret | default(true) }}'
  proxmox_csi_config_secret_name: "{{ global_talos_cluster.proxmox_csi.config_secret_name | default('proxmox-csi-config') }}"
  proxmox_csi_config_secret_key: "{{ global_talos_cluster.proxmox_csi.config_secret_key | default('config.yaml') }}"
  proxmox_csi_api_url: "{{ global_talos_cluster.proxmox_csi.api_url | default('') }}"
  proxmox_csi_insecure: '{{ global_talos_cluster.proxmox_csi.insecure | default(false) }}'
  proxmox_csi_token_id: "{{ global_talos_cluster.proxmox_csi.token_id | default('') }}"
  proxmox_csi_region: '{{ global_talos_cluster.proxmox_csi.region | default(global_talos_cluster.cluster_name | default(project_name)) }}'
  proxmox_csi_storage_classes_json: '{{ global_talos_cluster.proxmox_csi.storage_classes | default([]) | to_json }}'
  sops_age_public_key: "{{ global_sops_age_public_key | default('') }}"

# Directories to create
directories:
  - apps/base
  - infrastructure/controllers
  - infrastructure/configs

# Static files configuration
static:
  sync_mode: ignore-existing
  exclude:
    - '.git'
    - '*.j2' # Don't copy template files as static
    - '*.bak'

# Files that should never be overwritten
static_preserve:
  - 'clusters/*/flux-system/gotk-components.yaml' # Generated by flux bootstrap
  - 'apps/**/*.yaml' # User app definitions

# Optional hooks
hooks:
  post_generate: hooks/post.yml
