# Blueprint: k8s
# Purpose: Generate FluxCD GitOps repository for Kubernetes cluster management
# Env expansion: Uses _env_ pattern to create per-environment cluster directories

name: k8s
description: FluxCD GitOps repository for Kubernetes infrastructure and apps
version: '1.0.0'

# This blueprint does NOT iterate over hosts — it's cluster-level
# Instead, it uses _env_ expansion for per-environment cluster directories
host_source: null # No host iteration
env_expansion: true # Enable _env_ pattern substitution

# Context variables passed to all templates
context:
  cluster_name: "{{ global_talos_cluster.cluster_name | default('{{ project_name }}') }}"
  fluxcd_git_repo: "{{ global_talos_cluster.fluxcd.git_repo | default('') }}"
  fluxcd_git_branch: "{{ global_talos_cluster.fluxcd.git_branch | default('main') }}"
  traefik_enabled: '{{ global_talos_cluster.traefik.enabled | default(true) }}'
  traefik_domain: '{{ global_talos_cluster.traefik.domain | default(global_domain) }}'
  traefik_dashboard_subdomain: "{{ global_talos_cluster.traefik.dashboard_subdomain | default('traefik') }}"
  traefik_service_type: "{{ global_talos_cluster.traefik.service_type | default('LoadBalancer') }}"
  traefik_replicas: '{{ global_talos_cluster.traefik.replicas | default(1) }}'
  traefik_cloudflare_enabled: '{{ global_talos_cluster.traefik.cloudflare.enabled | default(false) }}'
  traefik_cloudflare_issuer_name: "{{ global_talos_cluster.traefik.cloudflare.issuer_name | default('letsencrypt-cloudflare') }}"
  traefik_cloudflare_acme_email: "{{ global_talos_cluster.traefik.cloudflare.acme_email | default('admin@' + global_domain) }}"
  traefik_cloudflare_api_token_secret_name: "{{ global_talos_cluster.traefik.cloudflare.api_token_secret_name | default('cloudflare-api-token') }}"
  traefik_cloudflare_api_token_secret_key: "{{ global_talos_cluster.traefik.cloudflare.api_token_secret_key | default('api-token') }}"
  sops_age_public_key: "{{ global_sops_age_public_key | default('') }}"

# Directories to create
directories:
  - apps/base
  - infrastructure/controllers
  - infrastructure/configs

# Static files configuration
static:
  sync_mode: ignore-existing
  exclude:
    - '.git'
    - '*.j2' # Don't copy template files as static
    - '*.bak'
    - 'infrastructure/controllers/kube-vip/**'

# Files that should never be overwritten
static_preserve:
  - 'clusters/*/flux-system/gotk-components.yaml' # Generated by flux bootstrap
  - 'apps/**/*.yaml' # User app definitions

# Optional hooks
hooks:
  post_generate: hooks/post.yml
