---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sops-secrets-operator
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: sops-secrets-operator
      version: '0.18.x'
      sourceRef:
        kind: HelmRepository
        name: mozilla-sops
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values: {}
