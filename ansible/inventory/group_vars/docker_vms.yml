---
# AUTO-GENERATED by StackForge — do not edit.
# Group variables for Docker VMs

host_role: docker
docker_enable: true
docker_storage_driver: "overlay2"
docker_log_driver: "json-file"
docker_log_max_size: "10m"
docker_log_max_file: "3"
docker_data_root: "/var/lib/docker"
docker_daemon_options:
  log-level: "info"
  storage-driver: "{{ docker_storage_driver }}"
  log-opts:
    max-size: "{{ docker_log_max_size }}"
    max-file: "{{ docker_log_max_file }}"
  userland-proxy: false
  experimental: false
  metrics-addr: "0.0.0.0:9323"
  default-address-pools:
    - base: "172.30.0.0/16"
      size: 24

docker_compose_enable: true
docker_compose_version: "latest"
docker_compose_base_dir: "/opt/docker-compose"

docker_insecure_registries: []
docker_registry_mirrors: []
docker_default_pull_policy: "missing"

docker_networks:
  - name: "traefik"
    driver: "bridge"
    internal: False
    attachable: True

  - name: "internal"
    driver: "bridge"
    internal: True
    attachable: True

docker_volume_mount_options:
  - "rw"
  - "noatime"

gitlab_runner_enable: true
gitlab_runner_executor: "docker"
gitlab_runner_concurrent: 4
gitlab_runner_docker_image: "docker:latest"
gitlab_runner_docker_volumes:
  - "/var/run/docker.sock:/var/run/docker.sock"
  - "/cache"

gitlab_runner_docker_privileged: True
gitlab_runner_docker_disable_cache: False
gitlab_runner_docker_pull_policy: "if-not-present"
gitlab_runner_tags:
  - "docker"
  - "{{ project_name}}"
  - "{{ inventory_hostname }}"

docker_enable_apparmor: true
docker_enable_seccomp: true
docker_userns_remap: false

# NOTE: node_exporter_* centralized in group_vars/nixos_vms.yml
cadvisor_enable: true
cadvisor_port: 8080
docker_metrics_enable: true
docker_metrics_port: 9323

# Docker-specific backup paths (in addition to default restic_backup_paths)
docker_backup_paths:
  - "/var/lib/docker/volumes"
  - "/opt/docker-compose"
  - "/etc/docker"

docker_backup_exclude_patterns:
  - "**/tmp"
  - "**/cache"
  - "**/logs/*.log"
  - "**/.cache"

docker_firewall_allowed_tcp_ports:
  - 22
  - 80
  - 443
  - 8080
  - 9100
  - 9323
docker_firewall_trusted_interfaces:
  - "docker0"

sysctl_settings:

# NOTE: system_timezone, system_locale, system_keymap, enable_debug_logging,
#       test_mode centralized in group_vars/all/system.yml

traefik_enable: false
portainer_enable: false
