---
# Core services group defaults

service_priority: "high"
service_critical: true
enable_ha: false
enable_clustering: false

restic_backup_enable: true
restic_backup_schedule: "0 */6 * * *"
restic_verify_schedule: "0 2 * * 0"
restic_retention:
  keep_last: 7
  keep_daily: 14
  keep_weekly: 8
  keep_monthly: 12
  keep_yearly: 3

enable_alerting: True
alert_critical: true

resource_priority: "guaranteed"
security_hardening_enable: true
audit_logging_enable: true
auto_update_enable: false
update_notification_enable: true
