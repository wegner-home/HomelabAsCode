---
# Proxmox node group defaults

ansible_user: root

# Proxmox cluster name override (must be hostname-style: [a-zA-Z0-9-])
proxmox_cluster_name: "pve-cluster-01"

proxmox_api_host: "{{ ansible_host }}"
proxmox_api_port: 8006
proxmox_api_validate_certs: false

proxmox_storage_local: "local"
proxmox_storage_local_lvm: "local-lvm"
proxmox_default_bridge: "vmbr0"

proxmox_template_source_type: "nixos_build"
# VM ID base — actual ID is auto-incremented per node (9000, 9001, 9002, ...)
proxmox_template_vm_id_base: 9000
proxmox_template_name: "nixos-cloud-init-tmpl"
proxmox_template_description: "NixOS Cloud-Init Template for {{ project_name }} VMs"
proxmox_template_cores: 2
proxmox_template_memory: 2048
proxmox_template_disk_size: 20G
proxmox_template_storage: "local-lvm"
proxmox_template_qemu_agent: true
proxmox_template_cloudinit_enable: true
proxmox_template_serial_console: true
proxmox_template_deploy_snippet: false
proxmox_template_generate_vm_snippets: true

proxmox_template_nixos_version: "25.11"
proxmox_template_nixos_build_dir: "/tmp/nixos-template-build"
proxmox_template_nixos_generator_format: "proxmox"
proxmox_template_nixos_install_generator: true
proxmox_template_force_rebuild: false
proxmox_template_cleanup: true
proxmox_template_compress_transfer: false
proxmox_template_nixos_extra_packages:
  - vim
  - git
  - curl
  - htop
  - tmux
  - wget
  - jq

proxmox_vm_defaults:

ssh_permit_root_login: "prohibit-password"
ssh_password_authentication: false
proxmox_auto_update: false
proxmox_subscription: "no-subscription"
proxmox_remove_enterprise_repo: true
proxmox_add_no_subscription_repo: true
