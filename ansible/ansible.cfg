; Ansible configuration for NixOS-based  bootstrap
[defaults]
gather_timeout = 30

; Secret management — see docs/PROJECT.md
;   All secrets use SOPS/age encryption:
;     Static secrets:  config/secrets/<env>/secrets.sops.yaml  → vault_secrets
;     Runtime secrets: config/secrets/<env>/runtime_secrets.sops.yaml → merged into vault_secrets
; Requires: SOPS_AGE_KEY_FILE env var

; Recommended settings
host_key_checking = False
retry_files_enabled = False
deprecation_warnings = True

; NixOS-specific: Enable gathering of package facts
gather_subset = !all,!min,network,virtual,hardware

[ssh_connection]
ssh_args = -o ControlMaster=no -o ControlPersist=no -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o ConnectTimeout=60
timeout = 120

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
