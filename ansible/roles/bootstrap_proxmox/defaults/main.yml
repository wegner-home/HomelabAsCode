---
# defaults file for bootstrap_proxmox role
bootstrap_proxmox_packages:
  - qemu-guest-agent
  - python3
  - python3-pip
  - python3-passlib
  - keyutils
  - cifs-utils
  - git
  - python3-proxmoxer

# FS
bootstrap_proxmox_service_user: "{{ global_service_user | default('ansible') }}"
bootstrap_proxmox_group: "{{ global_group | default('iac') }}"
bootstrap_proxmox_common_dirs: '{{ global_common_dirs | default([]) }}'
bootstrap_proxmox_folder: "{{ global_admin_folder | default('/var/lib/iac/admin') }}"
bootstrap_proxmox_common_mounts: '{{ global_common_mounts | default([]) }}'
bootstrap_proxmox_nas_user: "{{ vault_global_nas_user | default('') }}"
bootstrap_proxmox_nas_pass: "{{ vault_global_nas_pass | default('') }}"

# API Privileges
bootstrap_proxmox_default_api_privs: 'Realm.AllocateUser, VM.PowerMgmt, VM.GuestAgent.Unrestricted, Sys.Console, Sys.Audit, Sys.AccessNetwork, VM.Config.Cloudinit, VM.Replicate, Pool.Allocate, SDN.Audit, Realm.Allocate, SDN.Use, Mapping.Modify, VM.Config.Memory, VM.GuestAgent.FileSystemMgmt, VM.Allocate, SDN.Allocate, VM.Console, VM.Clone, VM.Backup, Datastore.AllocateTemplate, VM.Snapshot, VM.Config.Network, Sys.Incoming, Sys.Modify, VM.Snapshot.Rollback, VM.Config.Disk, Datastore.Allocate, VM.Config.CPU, VM.Config.CDROM, Group.Allocate, Datastore.Audit, VM.Migrate, VM.GuestAgent.FileWrite, Mapping.Use, Datastore.AllocateSpace, Sys.Syslog, VM.Config.Options, Pool.Audit, User.Modify, VM.Config.HWType, VM.Audit, Sys.PowerMgmt, VM.GuestAgent.Audit, Mapping.Audit, VM.GuestAgent.FileRead, Permissions.Modify'
