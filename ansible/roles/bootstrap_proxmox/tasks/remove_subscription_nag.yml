---
- name: Ensure /usr/local/bin directory exists
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    mode: '0755'
  become: true

- name: Deploy pve-remove-nag.sh script
  ansible.builtin.copy:
    dest: /usr/local/bin/pve-remove-nag.sh
    mode: '0755'
    content: |
      #!/bin/sh
      WEB_JS=/usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
      if [ -s "$WEB_JS" ] && ! grep -q NoMoreNagging "$WEB_JS"; then
          echo "Patching Web UI nag..."
          sed -i -e "/data\.status/ s/!//" -e "/data\.status/ s/active/NoMoreNagging/" "$WEB_JS"
      fi

      MOBILE_TPL=/usr/share/pve-yew-mobile-gui/index.html.tpl
      MARKER="<!-- MANAGED BLOCK FOR MOBILE NAG -->"
      if [ -f "$MOBILE_TPL" ] && ! grep -q "$MARKER" "$MOBILE_TPL"; then
          echo "Patching Mobile UI nag..."
          printf "%s\n" \
            "$MARKER" \
            "<script>" \
            "  function removeSubscriptionElements() {" \
            "    const dialogs = document.querySelectorAll('dialog.pwt-outer-dialog');" \
            "    dialogs.forEach(dialog => {" \
            "      const text = (dialog.textContent || '').toLowerCase();" \
            "      if (text.includes('subscription')) {" \
            "        dialog.remove();" \
            "      }" \
            "    });" \
            "    const cards = document.querySelectorAll('.pwt-card.pwt-p-2.pwt-d-flex.pwt-interactive.pwt-justify-content-center');" \
            "    cards.forEach(card => {" \
            "      const text = (card.textContent || '').toLowerCase();" \
            "      const hasButton = card.querySelector('button');" \
            "      if (!hasButton && text.includes('subscription')) {" \
            "        card.remove();" \
            "      }" \
            "    });" \
            "  }" \
            "  const observer = new MutationObserver(removeSubscriptionElements);" \
            "  observer.observe(document.body, { childList: true, subtree: true });" \
            "  removeSubscriptionElements();" \
            "  setInterval(removeSubscriptionElements, 300);" \
            "  setTimeout(() => {observer.disconnect();}, 10000);" \
            "</script>" >> "$MOBILE_TPL"
      fi
  become: true

- name: Configure apt dpkg post-invoke hook to run script
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/no-nag-script
    mode: '0644'
    content: |
      DPkg::Post-Invoke { "/usr/local/bin/pve-remove-nag.sh"; };
  become: true

- name: Reinstall proxmox-widget-toolkit safely
  ansible.builtin.command:
    cmd: apt-get install --reinstall -y proxmox-widget-toolkit
  register: reinstall_output
  changed_when: "'Setting up proxmox-widget-toolkit' in reinstall_output.stdout"
  become: true
