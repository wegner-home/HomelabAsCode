---
# Deployment summary
# Displays cluster info, endpoints, node list, FluxCD status, next steps.

- name: Display deployment summary
  ansible.builtin.debug:
    msg:
      - '=============================================='
      - 'Talos Bootstrap — Complete'
      - '=============================================='
      - ''
      - 'Mode:           {{ talos_bootstrap_mode }}'
      - 'Cluster:        {{ talos_cluster_name }}'
      - 'Endpoint:       {{ talos_cluster_endpoint }}'
      - 'Talos Version:  {{ talos_version }}'
      - 'K8s Version:    {{ talos_kubernetes_version }}'
      - ''
      - '--- Nodes ---'
      - 'Control Plane:  {{ talos_controlplane_ips | join(", ") }}'
      - 'Workers:        {{ talos_worker_ips | join(", ") if talos_worker_ips | length > 0 else "none (single-node)" }}'
      - 'VIP:            {{ talos_vip_ip if talos_vip_enabled else "disabled" }}'
      - ''
      - '--- Artifacts ---'
      - 'Talosconfig:    {{ talos_talosconfig_path }}'
      - 'Kubeconfig:     {{ talos_kubeconfig_path }}'
      - 'Secrets:        {{ talos_secrets_path }}'
      - ''
      - '--- FluxCD ---'
      - 'Enabled:        {{ talos_fluxcd_enabled }}'
      - 'Git Repo:       {{ talos_fluxcd_git_repo if talos_fluxcd_enabled else "n/a" }}'
      - 'Git Branch:     {{ talos_fluxcd_git_branch if talos_fluxcd_enabled else "n/a" }}'
      - 'Git Path:       {{ talos_fluxcd_git_path if talos_fluxcd_enabled else "n/a" }}'
      - ''
      - '--- Next Steps ---'
      - '  export KUBECONFIG={{ talos_kubeconfig_path }}'
      - '  kubectl get nodes'
      - '  {{ "flux get kustomizations -A" if talos_fluxcd_enabled else "# Enable FluxCD in inventory to deploy workloads" }}'
      - ''
      - '--- FluxCD Managed Stack (deploy via git repo) ---'
      - '  • Cilium CNI'
      - '  • MetalLB (address pool: {{ talos_metallb_address_pool }})'
      - '  • Longhorn storage'
      - '  • cert-manager'
      - '  • Prometheus + Grafana'
      - '  • Traefik ingress'
      - '=============================================='
