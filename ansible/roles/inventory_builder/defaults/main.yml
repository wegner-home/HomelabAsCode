---
# defaults file for inventory_builder orchestrator role
# Provides shared project settings inherited by all child roles,
# and build-target booleans to control which generators run.
#
# ==========================================================================
# Variable Prefix Convention: inventory_builder_
# ==========================================================================
# All Stage 2 variables use the inventory_builder_ prefix for historical
# reasons — this was originally a single monolithic role before being
# decomposed into 6 child roles. The prefix is retained as the Stage 2
# inter-role interface contract.
#
# Variable Ownership Map:
#
#   SHARED (defined here, inherited by all child roles):
#     inventory_builder_project_dir       — Terraform output root
#     inventory_builder_project_owner     — File owner for generated files
#     inventory_builder_project_group     — File group for generated files
#     inventory_builder_env               — Environment name (dev/staging/prod)
#     inventory_builder_generate_*        — Build target booleans (below)
#
#   inventory_loader owns:
#     inventory_builder_ssh_base_dir, _service_user_ssh_dir,
#     _service_user_ssh_pubkey, _include_service_user_ssh_key
#     Runtime facts: _all_hosts, _all_vms, _nixos_vms, _talos_cp,
#     _talos_worker, _default_sshkeys, _host_vars_map
#
#   terraform_generate_nixos owns:
#     inventory_builder_proxmox_node(s), _pm_api_url, _pm_api_token_id,
#     _pm_api_token_secret, _pm_default_datastore, _opnsense_api_*,
#     _enable_multiple_dns
#
#   terraform_generate_talos owns:
#     inventory_builder_talos_project_dir, _talos_enabled,
#     _talos_version, _talos_arch
#
#   nixos_flake_generate owns:
#     inventory_builder_nix_blueprint_dir, _nixos_version, _version,
#     _flakes_dir (shared with inventory_loader)
#
#   docker_compose_generate owns:
#     inventory_builder_docker_blueprint_dir, _docker_repo_output_dir,
#     _docker_compose_default_base_dir
#
#   k8s_gitops_generate owns:
#     inventory_builder_k8s_blueprint_dir, _k8s_repo_output_dir
#
# Future migration: role-specific prefixes (e.g. tf_gen_nixos_*) could
# replace role-specific vars. Shared vars would stay under inventory_builder_
# as the Stage 2 interface. See docs/PROJECT.md finding E3.
# ==========================================================================

# ===============================================
# Project Settings (shared by all child roles)
# ===============================================
# Normalize repo root from global_iac_root and guard against accidental
# '/ansible' suffix values.
inventory_builder_repo_root: >-
  {{ (global_iac_root | default(playbook_dir ~ '/..', true))
     | regex_replace('/+$', '')
     | regex_replace('/ansible$', '') }}
inventory_builder_project_dir: "{{ global_iac_terraform_dir if (global_iac_terraform_dir is defined and (global_iac_terraform_dir | trim) != '' and (global_iac_terraform_dir | trim) != '/terraform') else (inventory_builder_repo_root ~ '/terraform') }}"
inventory_builder_project_owner: '{{ (ansible_facts | default({})).get("env", {}).get("USER", lookup("env", "USER")) }}'
inventory_builder_project_group: "users"

# Environment name for artifact path construction (matches talos_bootstrap role)
inventory_builder_env: '{{ lookup("env", "NIX_ENV") | default("dev", true) }}'

# ===============================================
# Build Targets (control which generators run)
# ===============================================
# Override these in playbook vars to enable/disable specific outputs:
inventory_builder_generate_nixos_vms: true # Phase 2a: NixOS VM Terraform tfvars
inventory_builder_generate_talos: false # Phase 2b: Talos K8s Terraform tfvars
inventory_builder_generate_k8s_repo: false # Phase 4b: FluxCD GitOps repo structure
