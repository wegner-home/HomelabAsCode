---
- name: Make Sure Paths exist
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    mode: '0755'
  loop:
    - '{{ bootstrap_ssh_cert_host_cert_dir }}'
    - '{{ bootstrap_ssh_cert_host_key_path | dirname }}'
  become: true

- name: Generate Keys
  ansible.builtin.include_tasks: generate_key.yml

- name: Sign Certificate
  ansible.builtin.include_tasks: sign_cert.yml

- name: Deploy Host Certificate
  ansible.builtin.include_tasks: deploy_cert.yml

- name: Set permissions
  ansible.builtin.include_tasks: permissions.yml
