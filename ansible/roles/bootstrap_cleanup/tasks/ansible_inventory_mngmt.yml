---
- name: Copy host_vars template to production inventory
  ansible.builtin.copy:
    src: '{{ playbook_dir }}/inventory/staging/host_vars/{{ inventory_hostname }}.yml'
    dest: '{{ playbook_dir }}/inventory/production/host_vars/{{ inventory_hostname }}.yml'
    mode: '0644'
  delegate_to: localhost
  become: false

- name: Manage host in Ansible INI inventory
  when: bootstrap_cleanup_ansible_inventory_path is defined and bootstrap_cleanup_ansible_inventory_path != ""
  delegate_to: localhost
  become: false
  block:
    - name: Ensure inventory group exists in production INI file
      ansible.builtin.blockinfile:
        path: '{{ bootstrap_cleanup_ansible_inventory_path }}'
        block: |
          [{{ bootstrap_cleanup_ansible_inventory_group }}]
        marker: '# {mark} ANSIBLE MANAGED BLOCK {{ bootstrap_cleanup_ansible_inventory_group }}'
        create: true
        mode: '0644'

    - name: Add host to production INI inventory file
      ansible.builtin.lineinfile:
        path: '{{ bootstrap_cleanup_ansible_inventory_path }}'
        insertafter: '[{{ bootstrap_cleanup_ansible_inventory_group }}]'
        line: '{{ inventory_hostname }}'
        regexp: '^{{ inventory_hostname | regex_escape() }}$'
        state: present
