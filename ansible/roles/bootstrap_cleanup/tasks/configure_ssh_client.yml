---
- name: Configure local SSH client for access
  delegate_to: localhost
  become: false
  block:
    - name: Remove all old host keys from local known_hosts file using ssh-keygen
      ansible.builtin.command:
        cmd: 'ssh-keygen -R {{ item }}'
      loop:
        - '{{ inventory_hostname }}'
        - '{{ ansible_fqdn }}'
        - '{{ ansible_default_ipv4.address | default(inventory_hostname) }}'
      register: ssh_keygen_result
      changed_when: "'not found' not in ssh_keygen_result.stderr"
      failed_when: false
