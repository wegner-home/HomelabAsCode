---
# tasks file for k8s_gitops_generate role
# Generates a FluxCD GitOps repository via the blueprint_repo role.
#
# Uses _env_ expansion (not _host_ expansion) to render cluster manifests
# for the target environment (dev, dev-test, etc.).
#
# Template variables come from:
#   - global_talos_cluster (inventory)
#   - global_sops_age_public_key (from sops_age role or vault)
#   - inventory_builder_env (environment name)
#
# Prerequisites:
#   global_talos_cluster must be defined in inventory

- name: 'K8s GitOps — Generate repository'
  when: inventory_builder_generate_k8s_repo | default(false) | bool
  block:
    - name: Display K8s GitOps repo generation info
      ansible.builtin.debug:
        msg:
          - '================================================'
          - 'K8s GitOps Repository Generation via blueprint_repo'
          - '================================================'
          - 'Blueprint source: {{ inventory_builder_k8s_blueprint_dir }}'
          - 'Output:           {{ inventory_builder_k8s_repo_output_dir }}'
          - 'Environment:      {{ inventory_builder_env }}'
          - 'Cluster:          {{ global_talos_cluster.cluster_name | default(project_name) }}'
          - 'FluxCD repo:      {{ global_talos_cluster.fluxcd.git_repo | default("(not set)") }}'
          - 'Traefik:          {{ global_talos_cluster.traefik.enabled | default(true) | ternary("enabled", "disabled") }}'
          - 'Ingress domain:   {{ (global_talos_cluster.traefik.domain | default(global_domain, true)) }}'
          - 'Monitoring stack: {{ global_talos_cluster.monitoring.enabled | default(true) | ternary("enabled", "disabled") }}'
          - 'Monitoring domain: {{ (global_talos_cluster.monitoring.domain | default(global_talos_cluster.traefik.domain | default(global_domain), true)) }}'
          - 'StorageClass:     {{ global_talos_cluster.monitoring.storage_class | default("longhorn") }}'
          - 'Cloudflare DNS01: {{ global_talos_cluster.traefik.cloudflare.enabled | default(false) | ternary("enabled", "disabled") }}'
          - '================================================'
      run_once: true

    - name: Validate Cloudflare API token when DNS-01 is enabled
      ansible.builtin.assert:
        that:
          - (vault_secrets.cloudflare.api_token | default('')) | length > 0
        fail_msg: >-
          Cloudflare DNS-01 is enabled but no token was found in SOPS secrets.
          Set vault_secrets.cloudflare.api_token and re-run stage_2.
        quiet: true
      when: global_talos_cluster.traefik.cloudflare.enabled | default(false) | bool
      run_once: true

    - name: Render k8s blueprint
      ansible.builtin.include_role:
        name: blueprint_repo
      vars:
        blueprint_name: 'k8s'
        blueprint_source: '{{ inventory_builder_k8s_blueprint_dir }}'
        blueprint_output: '{{ inventory_builder_k8s_repo_output_dir }}'
        blueprint_env: '{{ inventory_builder_env }}'
        blueprint_hosts: {} # k8s uses _env_ expansion, not _host_
        blueprint_owner: '{{ inventory_builder_project_owner }}'
        blueprint_group: '{{ inventory_builder_project_group }}'
        blueprint_template_vars:
          cluster_name: '{{ global_talos_cluster.cluster_name | default(project_name) }}'
          fluxcd_git_repo: '{{ global_talos_cluster.fluxcd.git_repo | default("") }}'
          fluxcd_git_branch: '{{ global_talos_cluster.fluxcd.git_branch | default("main") }}'
          traefik_enabled: '{{ global_talos_cluster.traefik.enabled | default(true) }}'
          traefik_domain: '{{ global_talos_cluster.traefik.domain | default(global_domain, true) }}'
          traefik_dashboard_subdomain: '{{ global_talos_cluster.traefik.dashboard_subdomain | default("traefik") }}'
          traefik_service_type: '{{ global_talos_cluster.traefik.service_type | default("LoadBalancer") }}'
          traefik_replicas: '{{ global_talos_cluster.traefik.replicas | default(1) }}'
          traefik_cloudflare_enabled: '{{ global_talos_cluster.traefik.cloudflare.enabled | default(false) }}'
          traefik_cloudflare_issuer_name: '{{ global_talos_cluster.traefik.cloudflare.issuer_name | default("letsencrypt-cloudflare") }}'
          traefik_cloudflare_acme_email: '{{ global_talos_cluster.traefik.cloudflare.acme_email | default("admin@" + global_domain) }}'
          traefik_cloudflare_api_token_secret_name: '{{ global_talos_cluster.traefik.cloudflare.api_token_secret_name | default("cloudflare-api-token") }}'
          traefik_cloudflare_api_token_secret_key: '{{ global_talos_cluster.traefik.cloudflare.api_token_secret_key | default("api-token") }}'
          traefik_cloudflare_api_token: '{{ vault_secrets.cloudflare.api_token | default("") }}'
          monitoring_enabled: '{{ global_talos_cluster.monitoring.enabled | default(true) }}'
          monitoring_namespace: '{{ global_talos_cluster.monitoring.namespace | default("monitoring") }}'
          monitoring_storage_class: '{{ global_talos_cluster.monitoring.storage_class | default("longhorn") }}'
          monitoring_domain: '{{ global_talos_cluster.monitoring.domain | default(global_talos_cluster.traefik.domain | default(global_domain), true) }}'
          monitoring_grafana_subdomain: '{{ global_talos_cluster.monitoring.grafana_subdomain | default("grafana") }}'
          monitoring_loki_subdomain: '{{ global_talos_cluster.monitoring.loki_subdomain | default("loki") }}'
          monitoring_prometheus_storage_size: '{{ global_talos_cluster.monitoring.prometheus_storage_size | default("50Gi") }}'
          monitoring_alertmanager_storage_size: '{{ global_talos_cluster.monitoring.alertmanager_storage_size | default("10Gi") }}'
          monitoring_grafana_storage_size: '{{ global_talos_cluster.monitoring.grafana_storage_size | default("10Gi") }}'
          monitoring_loki_storage_size: '{{ global_talos_cluster.monitoring.loki_storage_size | default("50Gi") }}'
          monitoring_ingress_class_name: '{{ global_talos_cluster.monitoring.ingress_class_name | default("traefik") }}'
          monitoring_tls_issuer: >-
            {{
              (global_talos_cluster.monitoring.tls_issuer | default('', true))
              if (global_talos_cluster.monitoring.tls_issuer | default('', true) | length > 0)
              else (
                (global_talos_cluster.traefik.cloudflare.enabled | default(false) | bool)
                | ternary(
                    global_talos_cluster.traefik.cloudflare.issuer_name | default('letsencrypt-cloudflare'),
                    'selfsigned-issuer'
                  )
              )
            }}
          sops_age_public_key: '{{ global_sops_age_public_key | default("") }}'
        blueprint_git_init: true
        blueprint_git_commit: true
        blueprint_debug: false

    - name: Display K8s GitOps repo generation summary
      ansible.builtin.debug:
        msg:
          - '================================================'
          - 'K8s GitOps Repository Generated Successfully'
          - '================================================'
          - 'Output directory: {{ inventory_builder_k8s_repo_output_dir }}'
          - 'Environment:      {{ inventory_builder_env }}'
          - 'Cluster path:     clusters/{{ inventory_builder_env }}/'
          - ''
          - 'Infrastructure controllers:'
          - '  - Cilium (CNI)'
          - '  - cert-manager'
          - '  - kube-prometheus-stack + Loki ({{ global_talos_cluster.monitoring.enabled | default(true) | ternary("enabled", "disabled") }}, storageClass={{ global_talos_cluster.monitoring.storage_class | default("longhorn") }})'
          - '  - Traefik (Ingress: {{ global_talos_cluster.traefik.enabled | default(true) | ternary("enabled", "disabled") }}, domain={{ global_talos_cluster.traefik.domain | default(global_domain, true) }})'
          - '  - SOPS secrets operator'
          - ''
          - 'Next steps:'
          - '  1. Push to GitLab (stage_4 handles this)'
          - '  2. Bootstrap FluxCD: flux bootstrap git --url=<repo> --path=clusters/{{ inventory_builder_env }}'
          - '================================================'
      run_once: true
