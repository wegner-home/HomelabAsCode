---
# Default variables for gitlab_runner role
#
# PURPOSE: Create per-host runner authentication tokens via the GitLab API
# and write them to the path expected by the NixOS flake's
# services.gitlab-runner.services.*.registrationConfigFile
#
# The NixOS flake (generated by inventory_builder) handles:
#   ✓ services.gitlab-runner configuration (executor, tags, concurrent, etc.)
#   ✓ Docker virtualisation for runners
#   ✓ Auto-prune, image settings, tag lists
#
# This role handles:
#   ✓ Creating runner instances via GitLab API (POST /api/v4/user/runners)
#   ✓ Writing the authentication token to the registrationConfigFile path
#   ✓ Verifying runner connectivity after token deployment
#   ✓ Idempotent — skips hosts that already have a valid token file

# ===============================================
# GitLab API Connection
# ===============================================
gitlab_runner_api_url: '{{ global_gitlab_url | default("https://" + inventory_hostname + "." + global_domain) }}'
gitlab_runner_api_token: '{{ vault_secrets.gitlab.api_token | default("") }}'
gitlab_runner_validate_certs: false

# ===============================================
# Runner Token File
# ===============================================
# Must match registrationConfigFile in the NixOS flake's gitlab-runner config
gitlab_runner_token_file: '/var/lib/gitlab-runner/.runner-token'
gitlab_runner_token_file_owner: 'gitlab-runner'
gitlab_runner_token_file_group: '{{ global_group }}'
gitlab_runner_token_file_mode: '0600'

# ===============================================
# Runner Creation Defaults
# ===============================================
# These are used when creating the runner via API.
# Override per-host in host_vars to customize.
gitlab_runner_description: '{{ inventory_hostname }} - NixOS Runner'
gitlab_runner_executor: 'docker'
gitlab_runner_docker_image: 'alpine:latest'
gitlab_runner_tags:
  - docker
  - '{{ project_name }}'
  - '{{ inventory_hostname }}'
gitlab_runner_run_untagged: false
gitlab_runner_locked: false
gitlab_runner_access_level: 'not_protected' # 'not_protected' or 'ref_protected'
gitlab_runner_maximum_timeout: 3600 # seconds

# Runner type: 'instance_type', 'group_type', or 'project_type'
# instance_type = shared runner (requires admin API token)
# group_type    = group runner (requires gitlab_runner_group_id)
# project_type  = project runner (requires gitlab_runner_project_id)
gitlab_runner_type: 'instance_type'
# gitlab_runner_group_id: ''                    # Required for group_type
# gitlab_runner_project_id: ''                  # Required for project_type

# ===============================================
# Behaviour
# ===============================================
# Skip token creation if file already exists and is non-empty
gitlab_runner_skip_if_token_exists: true

# Verify GitLab API is reachable before attempting registration
gitlab_runner_verify_api: true

# Retry settings for API calls (GitLab may still be starting)
gitlab_runner_api_retries: 6
gitlab_runner_api_retry_delay: 10
