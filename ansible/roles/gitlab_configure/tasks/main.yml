---
# gitlab_configure — Thin orchestrator for post-deployment GitLab configuration
# ====================================================================
# Owns: credential generation, service startup waits, validation.
# Delegates to:
#   1. gitlab_api_bootstrap  — token lifecycle + resource provisioning (groups/projects/users)
#   2. gitlab_repo_init      — push local content to GitLab repositories
#
# NixOS configuration is generated by inventory_builder during stage 2
# and deployed by nixos_flake_deploy. This role runs AFTER the rebuild.

- name: Display GitLab configuration start
  ansible.builtin.debug:
    msg:
      - 'Configuring GitLab Server: {{ gitlab_fqdn }}'
      - 'Edition: GitLab {{ gitlab_edition | upper }}'
      - 'External URL: {{ gitlab_external_url }}'
      - 'API URL: {{ gitlab_api_url }} (using {{ "IP" if gitlab_use_ip_for_api else "FQDN" }})'
      - 'NixOS config: pre-deployed by inventory_builder + nixos_flake_deploy'

# ===============================================
# Generate root password if not in vault, then save credentials
# ===============================================
- name: Generate GitLab root password if not in vault
  ansible.builtin.set_fact:
    gitlab_root_password: "{{ vault_secrets.gitlab.root_password | default(lookup('password', '/dev/null chars=ascii_letters,digits,punctuation length=24')) }}"
  no_log: true
  tags:
    - vault
    - credentials

- name: Save GitLab admin credentials to SOPS
  ansible.builtin.include_role:
    name: sops_write
  vars:
    new_secrets:
      gitlab:
        admin_username: 'root'
        root_password: '{{ gitlab_root_password }}'
        admin_email: '{{ gitlab_root_email }}'
        url: '{{ gitlab_external_url }}'
        api_url: '{{ gitlab_api_url }}'
        fqdn: '{{ gitlab_fqdn }}'
  tags:
    - vault
    - credentials

# ===============================================
# Ensure GitLab services are running after NixOS rebuild
# ===============================================
# NixOS rebuild can cause race conditions where gitlab-db-config fails
# on first try but succeeds on retry. We need to ensure gitlab.service
# is actually started before waiting for HTTP readiness.

- name: Wait for gitlab-db-config to complete
  ansible.builtin.systemd:
    name: gitlab-db-config.service
    state: started
  register: gitlab_db_config_result
  until: gitlab_db_config_result is succeeded
  retries: 10
  delay: 60
  become: true
  tags:
    - service
    - startup

- name: Ensure GitLab service is started
  ansible.builtin.systemd:
    name: gitlab.service
    state: started
  register: gitlab_service_result
  until: gitlab_service_result is succeeded
  retries: 10
  delay: 60
  become: true
  tags:
    - service
    - startup

- name: Wait for GitLab to initialize (takes ~60s after service start)
  ansible.builtin.pause:
    seconds: 30
  when: gitlab_service_result.changed
  tags:
    - service
    - startup

# ===============================================
# Wait for GitLab to be ready (deployed via flake)
# ===============================================
- name: Wait for GitLab service to be ready
  ansible.builtin.uri:
    url: '{{ gitlab_api_url }}/users/sign_in'
    method: GET
    validate_certs: '{{ gitlab_ssl_verify }}'
    status_code: [200, 302] # Login page returns 200, root redirects with 302
    follow_redirects: none
  register: gitlab_readiness
  until: gitlab_readiness.status in [200, 302]
  retries: 30
  delay: 10
  failed_when: false
  tags:
    - verify
    - api

# NOTE: Root user creation is handled by NixOS via initialRootPasswordFile
# The flake deploys SOPS secrets, and gitlab-db-config.service creates the root user
# with the password from /run/secrets/gitlab-root-password

# ===============================================
# GitLab API Bootstrap (groups, projects, users)
# ===============================================
- name: Include GitLab API bootstrap
  ansible.builtin.include_role:
    name: gitlab_api_bootstrap
  when: gitlab_api_bootstrap_enable | default(true) | bool
  tags:
    - api
    - bootstrap

# ===============================================
# Repository Template Initialization
# ===============================================
- name: Include repository initialization
  ansible.builtin.include_role:
    name: gitlab_repo_init
  when: gitlab_repo_init_enable | default(true) | bool
  tags:
    - repos
    - repositories
    - init

# ===============================================
# Validation
# ===============================================
- name: Include validation tasks
  ansible.builtin.include_tasks: validate.yml
  tags:
    - validate
    - verify

- name: Display completion message
  ansible.builtin.debug:
    msg:
      - 'GitLab server configuration completed!'
      - 'URL: {{ gitlab_external_url }}'
      - 'API bootstrap: {{ "Completed" if (gitlab_api_bootstrap_enable | default(true)) else "Skipped" }}'
      - 'Runners: {{ "Configured" if (gitlab_runner_enable | default(true)) else "Skipped" }}'
      - 'Repository init: {{ "Completed" if (gitlab_repo_init_enable | default(true)) else "Skipped" }}'
