---
# helpers/nixos_vm_pretasks.yml
# ============================================================
# Common pre-tasks for all NixOS VM plays.
# Handles the SSH wait → Python bootstrap → fact gather
# sequence that every NixOS-targeting play needs.
#
# Usage (in a playbook's pre_tasks):
#   pre_tasks:
#     - name: Bootstrap NixOS VM for Ansible
#       ansible.builtin.include_tasks:
#         file: '{{ playbook_dir }}/helpers/nixos_vm_pretasks.yml'
#       tags: ['always']
#
# Requires:
#   - ansible_host set on target (via hosts.yml or host_vars)

- name: Wait for SSH to become available
  ansible.builtin.wait_for:
    host: '{{ ansible_host }}'
    port: 22
    delay: 5
    timeout: 300
  delegate_to: localhost
  become: false

- name: Install Python on NixOS (required for Ansible modules)
  ansible.builtin.raw: |
    if ! command -v python3 &> /dev/null; then
      sudo nix-env -iA nixos.python3
    fi
  become: false
  changed_when: false
  vars:
    # Ensure raw module uses the same SSH options as ansible.cfg
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

- name: Gather facts now that Python is available
  ansible.builtin.setup:
  become: false
